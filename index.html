<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

/* ===== GLOBAL ===== */
body {
  margin:0;
  font-family: 'Inter', 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top,#2E2278,#0b0a2a);
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* ===== CARD ===== */
.container {
  width:380px;
  background:white;
  border-radius:20px;
  padding:30px;
  box-shadow:0 25px 60px rgba(0,0,0,0.35);
  text-align:center;
  animation:fadeUp 0.6s ease;
}

@keyframes fadeUp {
  from {opacity:0; transform:translateY(25px);}
  to {opacity:1; transform:translateY(0);}
}

/* ===== HEADER ===== */
.header h1 {
  margin:0;
  font-size:18px;
  color:#2E2278;
}

.header span {
  font-size:12px;
  color:#E1A835;
  font-weight:600;
}

/* ===== ICON ===== */
.logo {
  width:60px;
  height:60px;
  margin:18px auto;
  border-radius:16px;
  background:linear-gradient(135deg,#E1A835,#c98d20);
  display:flex;
  align-items:center;
  justify-content:center;
  color:white;
  font-size:26px;
  box-shadow:0 12px 25px rgba(225,168,53,0.5);
}

/* ===== INPUT ===== */
.input-box {
  position:relative;
  width:100%;
  margin-top:15px;
}

.input-box input {
  width:100%;
  padding:14px 14px 14px 42px;
  border-radius:12px;
  border:1px solid #d1d5db;
  font-size:14px;
  outline:none;
  box-sizing:border-box;
}

.input-box input:focus {
  border-color:#E1A835;
  box-shadow:0 0 0 3px rgba(225,168,53,0.2);
}

.input-icon {
  position:absolute;
  left:12px;
  top:50%;
  transform:translateY(-50%);
  font-size:14px;
  color:#6b7280;
}

/* ===== BUTTON ===== */
button {
  width:100%;
  margin-top:18px;
  padding:14px;
  border:none;
  border-radius:12px;
  background:linear-gradient(135deg,#E1A835,#c98d20);
  color:white;
  font-weight:600;
  font-size:14px;
  cursor:pointer;
  transition:0.3s;
}

button:hover {
  transform:translateY(-2px);
  box-shadow:0 10px 25px rgba(225,168,53,0.4);
}

/* ===== LOADER ===== */
.loader {
  margin-top:18px;
  display:none;
}

.spinner {
  width:28px;
  height:28px;
  border:3px solid #eee;
  border-top:3px solid #2E2278;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin:auto;
}

@keyframes spin {
  to { transform:rotate(360deg); }
}

.loading-text {
  font-size:12px;
  color:#555;
  margin-top:6px;
}

/* ===== ERROR ===== */
.error {
  margin-top:12px;
  padding:10px;
  border-radius:10px;
  background:#ffe5e5;
  color:#b91c1c;
  font-size:13px;
  display:none;
}

/* ===== FOOTER ===== */
.footer {
  margin-top:18px;
  font-size:11px;
  color:#999;
}

</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1>DRIEMS UNIVERSITY</h1>
    <span>IT Service Management Portal</span>
  </div>

  <!-- PROFESSIONAL ICON -->
  <div class="logo">💻</div>

  <!-- INPUT -->
  <div class="input-box">
    <span class="input-icon">🔎</span>
    <input 
      id="ticketInput" 
      placeholder="Enter Ticket ID (e.g. 2204261251ITI2NDCAME1016)">
  </div>

  <!-- BUTTON -->
  <button onclick="trackTicket()">Check Ticket Status</button>

  <!-- LOADER -->
  <div class="loader" id="loader">
    <div class="spinner"></div>
    <div class="loading-text">Fetching ticket details...</div>
  </div>

  <!-- ERROR -->
  <div class="error" id="errorMsg"></div>

  <div class="footer">© DRIEMS IT Department</div>

</div>

<script>

function trackTicket() {
  var ticket = document.getElementById("ticketInput").value.trim();
  var loader = document.getElementById("loader");
  var error  = document.getElementById("errorMsg");

  error.style.display = "none";

  if (!ticket) {
    error.innerText = "⚠ Please enter Ticket ID";
    error.style.display = "block";
    return;
  }

  loader.style.display = "block";

  var baseUrl = "https://script.google.com/a/macros/driems.ac.in/s/AKfycbxZKMgefaveR5xFotc-6ji8XgdumFbiLwJmPyj1J0auKmuhD3lPsxkW2ZTJ-i44uHs9/exec";

  setTimeout(function() {
    top.location.href = baseUrl + "?ticket=" + encodeURIComponent(ticket);
  }, 700);
}

</script>

</body>
</html>
